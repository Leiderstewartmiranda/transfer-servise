# =====================================================
# SonarQube - Transfer Service
# Ejecutar: mvn verify sonar:sonar -Dsonar.token=<TOKEN>
# =====================================================

sonar.projectKey=transfer-service
sonar.projectName=Transfer Service
sonar.projectVersion=1.0.0

# Fuentes
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Cobertura JaCoCo
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclusiones (infraestructura sin lógica de negocio)
sonar.exclusions=\
  **/entity/**,\
  **/dto/**,\
  **/*Dtos.java,\
  **/config/**,\
  **/TransferServiceApplication.java

sonar.coverage.exclusions=\
  **/entity/**,\
  **/*Dtos.java,\
  **/config/**,\
  **/mapper/**,\
  **/TransferServiceApplication.java

# Quality Gate: falla si bugs bloqueantes o cobertura < 70%
sonar.qualitygate.wait=true

# Codificación
sonar.sourceEncoding=UTF-8
