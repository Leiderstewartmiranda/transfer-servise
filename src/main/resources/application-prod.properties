# =====================================================
# Perfil PRODUCCIÓN — sobreescribe application.properties
# Activar con: --spring.profiles.active=prod
# O con env var: SPRING_PROFILES_ACTIVE=prod
# =====================================================

# PostgreSQL (valores desde variables de entorno)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/transferdb}
spring.datasource.username=${DB_USERNAME:transfer_user}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=TransferHikariPool

# JPA producción
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Deshabilitar H2 y data.sql en producción (el schema lo maneja init-postgres.sql)
spring.h2.console.enabled=false
spring.sql.init.mode=never

# JWT desde variable de entorno (OBLIGATORIO en prod)
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# Logging producción
logging.level.com.transfer=INFO
logging.level.org.springframework.security=WARN
logging.level.root=WARN

# Actuator seguro en prod (solo health público)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
